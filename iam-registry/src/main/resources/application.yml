server:
  port: 18081

spring:
  application:
    name: iam-registry
  datasource:
    url: jdbc:postgresql://localhost:5432/iam_db
    username: iam_user
    password: iam_password
    driver-class-name: org.postgresql.Driver
  jpa:
    # Pilot phase: drop & recreate schema on every boot so ScimMetaInitializer
    # always seeds against a clean DB. Switch to 'update' (or migrations via
    # Flyway/Liquibase) once the schema stabilizes and real data needs to persist.
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/

logging:
  level:
    com.iam.registry: DEBUG
